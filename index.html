<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pro - UNIPAZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Mi Dashboard Final</h1>
                <p class="text-slate-500 italic">Integración de múltiples APIs [cite: 260]</p>
            </div>
            <div class="text-right hidden md:block">
                <span class="text-xs font-bold text-indigo-600 uppercase tracking-widest">Desarrollo Web II</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-gradient-to-br from-indigo-600 to-blue-700 rounded-3xl p-6 text-white shadow-xl">
                    <h2 class="text-xl font-bold mb-4">Estado del Clima</h2>
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="cityInput" placeholder="Buscar ciudad..." 
                               class="w-full px-4 py-2 rounded-xl text-slate-800 focus:outline-none">
                        <button onclick="updateWeather()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl transition">
                            🔍
                        </button>
                    </div>
                    <div id="weatherDisplay" class="text-center py-4">
                        <p class="text-blue-100">Busca una ciudad para ver los datos [cite: 220]</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                        <h2 class="text-2xl font-bold text-slate-800">Explorador de Multiverso</h2>
                        <input type="text" id="charSearch" onkeyup="searchCharacters()" placeholder="Filtrar por nombre..." 
                               class="px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
                    </div>

                    <div id="charGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-h-[600px] overflow-y-auto pr-2">
                        <div class="col-span-full text-center py-12 text-slate-400">Cargando personajes...</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
